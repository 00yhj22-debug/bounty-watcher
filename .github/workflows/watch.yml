name: bounty-watch

on:
  schedule:
    # Every 30 minutes. GitHub Actions cron can slip 5-15 minutes during peak
    # hours, so the script uses a 3-hour lookback to avoid missing posts.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bounty-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run watcher
        run: python bounty_watcher.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}

      - name: Commit state updates
        run: |
          if git diff --quiet -- state.json; then
            echo "no state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
